<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMS Auth API 테스트</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;max-width:900px;margin:24px auto;padding:0 12px;background:#f6f8fb;color:#111827}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:14px}
    h1{margin:0 0 12px} h3{margin:0 0 10px}
    input,button{font:inherit}
    input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;margin:6px 0}
    button{margin-top:8px;padding:10px 14px;border:0;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
    pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:8px;overflow:auto;min-height:80px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width: 800px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h1>로그인 API 테스트 페이지</h1>
  <p>기본 서버: <code>http://localhost:8080</code> (필요하면 변경 가능)</p>

  <div class="card">
    <label>Base URL</label>
    <input id="baseUrl" value="http://localhost:8080" />
  </div>

  <div class="row">
    <div class="card">
      <h3>회원가입 /api/auth/signup</h3>
      <input id="suName" placeholder="name" value="테스터" />
      <input id="suLoginId" placeholder="loginId" value="tester01" />
      <input id="suPassword" placeholder="password" value="1234" />
      <button onclick="signup()">회원가입 요청</button>
    </div>

    <div class="card">
      <h3>로그인 /api/auth/login</h3>
      <input id="liLoginId" placeholder="loginId" value="tester01" />
      <input id="liPassword" placeholder="password" value="1234" />
      <button onclick="login()">로그인 요청</button>
    </div>
  </div>

  <div class="card">
    <h3>로그아웃 /api/auth/logout</h3>
    <input id="loToken" placeholder="token (로그인 응답에서 자동 입력됨)" />
    <button onclick="logout()">로그아웃 요청</button>
  </div>

  <div class="card">
    <h3>응답 로그</h3>
    <pre id="out">아직 요청 없음</pre>
  </div>

<script>
const out = document.getElementById('out');

function base(){
  return document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
}

async function call(path, body){
  const url = base() + path;
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const text = await res.text();
  let data;
  try{ data = JSON.parse(text); } catch { data = text; }
  out.textContent = `[${res.status}] ${url}\n\n` + JSON.stringify(data, null, 2);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return data;
}

async function signup(){
  try{
    await call('/api/auth/signup', {
      name: document.getElementById('suName').value,
      loginId: document.getElementById('suLoginId').value,
      password: document.getElementById('suPassword').value
    });
  }catch(e){}
}

async function login(){
  try{
    const data = await call('/api/auth/login', {
      loginId: document.getElementById('liLoginId').value,
      password: document.getElementById('liPassword').value
    });
    if(data && data.token){
      document.getElementById('loToken').value = data.token;
    }
  }catch(e){}
}

async function logout(){
  try{
    await call('/api/auth/logout', {
      token: document.getElementById('loToken').value
    });
  }catch(e){}
}
</script>
</body>
</html>
