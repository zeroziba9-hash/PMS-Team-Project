server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret: pms-super-secret-key-for-jwt-hs256-signing-must-be-256bits-or-longer!!
  expiration: 86400000  # 24시간 (ms)
