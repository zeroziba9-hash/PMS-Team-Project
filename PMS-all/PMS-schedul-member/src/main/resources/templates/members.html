<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Lite PMS</title>
    <link rel="stylesheet" th:href="@{/css/members.css}">
</head>
<body>
    <div class="wrapper">
        <!-- 사이드바 -->
        <div th:replace="~{fragments/sidebar :: sidebar('members')}"></div>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <div class="page-header">
                <h1>멤버 관리</h1>
                <div class="header-controls">
                    <button id="addMemberBtn" class="btn-add-member">+ 멤버 추가</button>
                </div>
            </div>

            <div class="content">
                <table class="members-table">
                    <thead>
                        <tr>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>역할</th>
                            <th></th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #999; padding: 30px;">프로젝트를 선택하세요</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 모달 -->
    <div id="addMemberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>멤버 추가</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="dual-list-container">
                    <!-- 왼쪽: 전체 사용자 목록 (검색 가능) -->
                    <div class="list-column">
                        <label for="userSearch">사용자 검색</label>
                        
                        <div id="availableUsersList" class="user-list-box">
                            <!-- JS에서 동적으로 생성됨 -->
                        </div>
                        <input type="text" id="userSearch" placeholder="이름 또는 ID 검색..." class="search-input">
                    </div>

                    <!-- 중앙: 이동 버튼 -->
                    <div class="list-controls">
                        <button id="moveToRightBtn" class="btn-move" title="추가 리스트로 이동">&gt;</button>
                    </div>

                    <!-- 오른쪽: 추가 예정 멤버 목록 -->
                    <div class="list-column">
                        <label>추가될 멤버 목록</label>
                        <div id="selectedUsersList" class="user-list-box">
                            <!-- JS에서 동적으로 생성됨 -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel">취소</button>
                <button id="confirmAddBtn" class="btn-confirm">추가</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/members.js}"></script>
</body>
</html>
