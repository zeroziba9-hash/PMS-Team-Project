<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Lite PMS - 내 프로젝트</title>
    <link rel="stylesheet" th:href="@{/css/schedule.css}">
    <style>
        .hub-wrapper { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
        .hub-title { font-size: 26px; font-weight: 700; color: var(--g-900); margin-bottom: 6px; }
        .hub-sub   { font-size: 14px; color: var(--g-400); margin-bottom: 36px; }

        .proj-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .proj-card {
            background: var(--g-0);
            border: 1px solid var(--g-200);
            border-radius: var(--r-xl);
            padding: 20px;
            cursor: pointer;
            transition: box-shadow .15s, transform .15s;
            text-decoration: none;
            display: block;
        }
        .proj-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.09); transform: translateY(-2px); }

        .proj-card-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: #fff;
            margin-bottom: 14px;
        }
        .proj-card-title { font-size: 15px; font-weight: 700; color: var(--g-900); margin-bottom: 5px; }
        .proj-card-desc  { font-size: 12px; color: var(--g-400); line-height: 1.5;
                           overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .proj-card-footer {
            margin-top: 14px; padding-top: 12px;
            border-top: 1px solid var(--g-100);
            font-size: 11px; color: var(--g-400);
        }

        .proj-new-card {
            border: 2px dashed var(--g-200);
            border-radius: var(--r-xl);
            padding: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 8px; cursor: pointer;
            min-height: 140px;
            transition: border-color .15s, background .15s;
        }
        .proj-new-card:hover { border-color: var(--blue); background: var(--blue-light); }
        .proj-new-icon { font-size: 28px; color: var(--g-300); }
        .proj-new-label { font-size: 13px; color: var(--g-400); font-weight: 500; }

        /* 로그인 배너 */
        .hub-login-bar {
            background: var(--g-0); border: 1px solid var(--g-200);
            border-radius: var(--r-xl); padding: 20px 24px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 32px;
        }
        .hub-login-name { font-size: 16px; font-weight: 700; color: var(--g-900); }
        .hub-login-sub  { font-size: 13px; color: var(--g-400); margin-top: 2px; }
        .hub-user-av {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--blue); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; margin-right: 14px; flex-shrink: 0;
        }
        .hub-logout {
            font-size: 12px; color: var(--g-400); background: none;
            border: 1px solid var(--g-200); border-radius: var(--r-md);
            padding: 6px 12px; cursor: pointer;
        }
        .hub-logout:hover { color: #ef4444; border-color: #ef4444; }

        .empty-state { text-align: center; padding: 60px 0; color: var(--g-400); }
        .empty-state div { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }
    </style>
</head>
<body style="background:var(--g-50);min-height:100vh;">

<div class="hub-wrapper">
    <div class="hub-login-bar">
        <div style="display:flex;align-items:center;">
            <div class="hub-user-av" id="hubAvatar">?</div>
            <div>
                <div class="hub-login-name" id="hubUserName">로딩중...</div>
                <div class="hub-login-sub">Notion Lite PMS</div>
            </div>
        </div>
        <button class="hub-logout" onclick="hubLogout()">로그아웃</button>
    </div>

    <div class="hub-title">내 프로젝트</div>
    <div class="hub-sub">참여 중인 프로젝트를 선택하세요</div>

    <div class="proj-grid" id="projGrid">
        <div class="empty-state" style="grid-column:1/-1;">
            <div>📂</div><p>프로젝트를 불러오는 중...</p>
        </div>
    </div>
</div>

<script th:src="@{/js/toast.js}"></script>
<script>
    const API = 'http://localhost:8080/api';
    const token = sessionStorage.getItem('pms_token');
    const userStr = sessionStorage.getItem('pms_user');
    if (!token) window.location.href = '/login';

    const COLORS = ['#4f6ef7','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
    function getColor(id) { return COLORS[id % COLORS.length]; }

    // 유저 정보
    if (userStr) {
        try {
            const u = JSON.parse(userStr);
            const name = u.name || u.loginId || '사용자';
            document.getElementById('hubUserName').textContent = name;
            document.getElementById('hubAvatar').textContent = name.charAt(0);
        } catch(e) {}
    }

    function hubLogout() {
        sessionStorage.clear();
        window.location.href = '/login';
    }

    async function loadProjects() {
        try {
            const res = await fetch(`${API}/projects/my`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const projects = res.ok ? await res.json() : [];
            renderProjects(projects);
        } catch(e) {
            document.getElementById('projGrid').innerHTML =
                '<div class="empty-state" style="grid-column:1/-1;"><div>⚠️</div><p>프로젝트를 불러오지 못했습니다</p></div>';
        }
    }

    function renderProjects(projects) {
        const grid = document.getElementById('projGrid');
        if (projects.length === 0) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div>📂</div><p>참여 중인 프로젝트가 없습니다</p></div>';
            return;
        }
        const cards = projects.map(p => {
            const color = getColor(p.id);
            const initial = p.title ? p.title.charAt(0).toUpperCase() : 'P';
            const desc = p.description || '설명 없음';
            const date = p.createdAt ? p.createdAt.substring(0,10) : '';
            return `
            <a class="proj-card" href="/project/${p.id}/index">
                <div class="proj-card-icon" style="background:${color};">${initial}</div>
                <div class="proj-card-title">${p.title}</div>
                <div class="proj-card-desc">${desc}</div>
                <div class="proj-card-footer">생성일: ${date}</div>
            </a>`;
        }).join('');
        grid.innerHTML = cards;
    }

    loadProjects();
</script>
</body>
</html>
