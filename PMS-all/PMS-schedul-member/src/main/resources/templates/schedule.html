<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Lite PMS - 일정 관리</title>
    <link rel="stylesheet" th:href="@{/css/schedule.css}">
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('schedule')}"></div>

    <main class="main-content">
        <div class="page-header">
            <h1>일정 관리</h1>
        </div>

        <div style="padding:0 0 32px;">

            <!-- 월 네비게이션 -->
            <div class="calendar-nav">
                <button id="prevMonth" class="month-btn">&#8249;</button>
                <h2 id="monthYear" class="month-title"></h2>
                <button id="nextMonth" class="month-btn">&#8250;</button>
                <div class="calendar-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#9ca3af;"></div> 시작 전</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#4f6ef7;"></div> 진행중</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#10b981;"></div> 완료</div>
                </div>
            </div>

            <!-- CSS Grid 캘린더 -->
            <div class="cal-grid" id="calGrid">
                <!-- JS로 렌더링 -->
            </div>

            <!-- 선택 날짜 태스크 패널 -->
            <div class="task-details" id="taskDetails">
                <h3 id="selectedDateTitle">날짜를 선택하세요</h3>
                <div id="taskList" class="task-list">
                    <p class="empty-hint">날짜를 클릭하면 해당 날짜의 태스크를 볼 수 있습니다</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/toast.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/schedule.js}"></script>
</body>
</html>
