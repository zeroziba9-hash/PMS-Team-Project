<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 개요</title>
    <style>
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8f9fa; 
            padding: 50px; 
            display: flex; justify-content: center;
        }
        .card {
            background: white;
            width: 100%; max-width: 900px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.05);
        }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 24px; margin: 0; color: #1a1a1a; }
        .header p { color: #666; margin-top: 10px; font-size: 15px; }
        
        .progress-label { 
            display: flex; justify-content: space-between; 
            margin-bottom: 10px; font-size: 14px; font-weight: 600;
        }
        
        .progress-container {
            width: 100%; height: 10px;
            background-color: #eee;
            border-radius: 10px; overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7); /* 보라색 그라데이션 */
            border-radius: 10px;
            transition: width 0.8s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1 th:text="'🚀 ' + ${projectName}">프로젝트 이름</h1>
            <p th:text="${description}">프로젝트 설명이 여기에 들어갑니다.</p>
        </div>

        <div class="progress-section">
            <div class="progress-label">
                <span>진행률</span>
                <span th:text="${progress} + '%'">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" th:style="'width: ' + ${progress} + '%;'"></div>
            </div>
        </div>
    </div>
</body>
</html>
